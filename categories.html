<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Gestió de Categories</title>
</head>
<body>
    <aside class="sidebar">
        <h2>Menu</h2>
        <ul class="sidebarList">
            <li class="sidebarElement"> <a href="#">Llistat d'Activitats</a></li>
            <li class="sidebarElement"> <a href="#"> Crear Tasca</a></li>
            <li class="sidebarElement"> <a href="categories.html">Gestio de Categories</a></li>
        </ul>
    </aside>
    <main style="padding: 20px; flex-grow: 1;">
        <h1>Gestió de Categories</h1>
        
        <div class="ContainerCategories">
            <form class="FormCategoria caja" id="FormCategoria" action="">
                <label for="categoryName">Nom de la Categoria:</label>
                <input type="text" id="categoryName" name="categoryName" required>
                <label for="colorPicker">Elige un color:</label>
                <input type="color" id="colorPicker" name="colorPicker" value="#ff0000">
                <button type="submit">Crear Categoria</button>
            </form>
        </div>
        <div class="listaCategorias ">
            <ul class="listaCategoriasUl caja">
                <li></li>
            </ul>
        </div>
    </main>
    
    <script src="js/categories.js"></script>
    
</body>
</html>
